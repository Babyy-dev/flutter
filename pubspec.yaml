name: strategy_game
description: "AI-powered text strategy simulation game."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_remote_config: ^5.4.2
  firebase_analytics: ^11.4.4
  cloud_functions: ^5.4.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Ads
  google_mobile_ads: ^5.3.0

  # In-app purchases
  in_app_purchase: ^3.2.0

  # Image export & sharing
  widgets_to_image: ^0.0.3
  share_plus: ^10.1.4

  # Audio
  audioplayers: ^6.1.0

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/l10n/
    - assets/fonts/
    - assets/audio/

  fonts:
    - family: CinzelDecorative
      fonts:
        - asset: assets/fonts/CinzelDecorative-Regular.ttf
        - asset: assets/fonts/CinzelDecorative-Bold.ttf
          weight: 700
    - family: NotoSerifJP
      fonts:
        - asset: assets/fonts/NotoSerifJP-Regular.ttf
        - asset: assets/fonts/NotoSerifJP-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSerifJP-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSerifJP-Bold.ttf
          weight: 700
