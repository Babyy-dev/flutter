<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy – Steel Verdict</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #060A10;
      color: #DDCB9A;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .shield {
      font-size: 3rem;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 12px #D4A01788);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #F5C842;
      text-shadow: 0 0 18px #D4A01766;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #9A8A6A;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .card {
      background: linear-gradient(160deg, #141C24, #1C2A38);
      border: 1px solid #D4A017;
      border-radius: 10px;
      padding: 36px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 32px #00000066, 0 0 24px #D4A01722;
      text-align: center;
    }

    .card p {
      color: #9A8A6A;
      font-size: 0.95rem;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .links a {
      display: inline-block;
      padding: 13px 36px;
      background: linear-gradient(160deg, #1C2A38, #263848);
      border: 1px solid #D4A017;
      border-radius: 6px;
      color: #F5C842;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: box-shadow 0.2s, background 0.2s;
      box-shadow: 0 0 10px #D4A01733;
    }

    .links a:hover {
      background: linear-gradient(160deg, #263848, #2E4458);
      box-shadow: 0 0 20px #D4A01766;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #D4A017, transparent);
      margin: 28px auto;
    }

    footer {
      margin-top: 32px;
      font-size: 0.78rem;
      color: #5C4E38;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <div class="shield">⚔️</div>
  <h1>Steel Verdict</h1>
  <p class="subtitle">Privacy Policy</p>

  <div class="card">
    <p>Please select your language<br />言語を選択してください</p>
    <div class="divider"></div>
    <div class="links">
      <a href="privacy_en.html">English</a>
      <a href="privacy_ja.html">日本語</a>
    </div>
  </div>

  <footer>&copy; 2026 Steel Verdict. All rights reserved.</footer>

</body>
</html>
